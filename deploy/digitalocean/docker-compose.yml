services:
  backend:
    build:
      context: ../../backend
    image: yolobox/backend:production
    restart: unless-stopped
    environment:
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET to a long random value}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?set BETTER_AUTH_URL}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:?set BETTER_AUTH_TRUSTED_ORIGINS}
      YOLOBOX_APP_URL: ${YOLOBOX_APP_URL:?set YOLOBOX_APP_URL}
      YOLOBOX_API_URL: ${YOLOBOX_API_URL:?set YOLOBOX_API_URL}
      YOLOBOX_BACKEND_CORS_ORIGINS: ${YOLOBOX_BACKEND_CORS_ORIGINS:?set YOLOBOX_BACKEND_CORS_ORIGINS}
      YOLOBOX_PREVIEW_BASE_DOMAIN: ${YOLOBOX_PREVIEW_BASE_DOMAIN:?set YOLOBOX_PREVIEW_BASE_DOMAIN}
      YOLOBOX_PREVIEW_TARGET_PORT: ${YOLOBOX_PREVIEW_TARGET_PORT:-80}
      YOLOBOX_BACKEND_LISTEN: 0.0.0.0:8787
      YOLOBOX_BACKEND_STATE: /data/backend.json
      YOLOBOX_BACKEND_AUTH_DB: /data/auth.sqlite
      YOLOBOX_SSH_CA_KEY: /data/ssh_ca_ed25519
      YOLOBOX_BACKEND_PROVIDER: ${YOLOBOX_BACKEND_PROVIDER:-digitalocean}
      DIGITALOCEAN_ACCESS_TOKEN: ${DIGITALOCEAN_ACCESS_TOKEN:?set DIGITALOCEAN_ACCESS_TOKEN for VM provisioning}
      DIGITALOCEAN_REGION: ${DIGITALOCEAN_REGION:-nyc3}
      DIGITALOCEAN_SIZE: ${DIGITALOCEAN_SIZE:-s-2vcpu-4gb-amd}
      YOLOBOX_REMOTE_IMAGE: ${YOLOBOX_REMOTE_IMAGE:-}
      DIGITALOCEAN_IMAGE: ${DIGITALOCEAN_IMAGE:-ubuntu-24-04-x64}
      DIGITALOCEAN_SSH_KEYS: ${DIGITALOCEAN_SSH_KEYS:-}
      DIGITALOCEAN_TAGS: ${DIGITALOCEAN_TAGS:-yolobox}
      DIGITALOCEAN_VPC_UUID: ${DIGITALOCEAN_VPC_UUID:-}
      YOLOBOX_REMOTE_SSH_PUBLIC_KEY: ${YOLOBOX_REMOTE_SSH_PUBLIC_KEY:-}
    expose:
      - "8787"
    volumes:
      - /opt/yolobox/data/backend:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
      YOLOBOX_APP_HOST: ${YOLOBOX_APP_HOST:?set YOLOBOX_APP_HOST}
      YOLOBOX_API_HOST: ${YOLOBOX_API_HOST:?set YOLOBOX_API_HOST}
      YOLOBOX_PREVIEW_BASE_DOMAIN: ${YOLOBOX_PREVIEW_BASE_DOMAIN:?set YOLOBOX_PREVIEW_BASE_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/yolobox/data/caddy/data:/data
      - /opt/yolobox/data/caddy/config:/config
